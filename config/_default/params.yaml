# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
appearance:
  mode: light
  color: blue
font: "Mr Robot"

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: ''
    description: 'This is the personal website of Abhinav Agrawal.'
    twitter: 'abhiagwl'
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
    baidu: ''



# Site header
header:
  navbar:
    enable: true
    blox: "navbar"
    fixed_to_top: false
    show_search: false
    show_theme_chooser: false
    align: r
    logo:
      text: "Abhinav Agrawal"
    highlight_active_link: true

# Site footer
footer:
  copyright:
    notice: '© {year} Abhinav Agrawal.'
    license:
      enable: true
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'

# Site features
features:
  math:
    enable: true
  privacy_pack:
    enable: false
